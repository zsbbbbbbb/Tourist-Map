<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的旅游足迹地图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/china.js"></script>
    <style>
        /* 适配飞书内置浏览器：调整容器高度、去掉阴影（更简洁） */
        body { margin: 0; padding: 10px; background-color: #f5f5f5; }
        #map-container { width: 100%; height: 600px; /* 飞书里高度调低更适配 */ background-color: white; border-radius: 4px; }
        /* 弹窗适配飞书：缩小尺寸、优化触摸交互 */
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; /* 自适应飞书窗口 */ max-width: 400px; background: white; padding: 15px; border-radius: 6px; box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 100; }
        .popup img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .popup h3 { margin: 0 0 10px 0; color: #333; font-size: 16px; }
        .popup p { color: #666; line-height: 1.6; font-size: 14px; }
        .close-btn { position: absolute; top: 8px; right: 8px; cursor: pointer; font-size: 18px; color: #999; }
        .mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
    </style>
</head>
<body>
    <div id="map-container"></div>

    <div class="mask" id="mask"></div>
    <div class="popup" id="popup">
        <span class="close-btn" id="closeBtn">×</span>
        <h3 id="cityName"></h3>
        <img id="cityImg" src="" alt="旅游照片">
        <p id="cityNote"></p>
        <p id="cityTime"></p>
    </div>

    <script>
        var myChart = echarts.init(document.getElementById('map-container'));

        // 替换成你的数据（建议照片用飞书云文档的公开链接，示例：https://fdfs.xiaoe-tech.com/xxx.jpg）
        var visitedCities = [
            { name: '北京', value: 1, img: 'https://img0.baidu.com/it/u=123456,789012&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=500', note: '2023年国庆去的，爬了长城，吃了烤鸭！', time: '到访时间：2023-10-01 至 2023-10-07' },
            { name: '上海', value: 1, img: 'https://img2.baidu.com/it/u=111222,333444&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=500', note: '迪士尼玩了一整天，烟花超美！', time: '到访时间：2024-05-01 至 2024-05-05' }
        ];

        var option = {
            title: {
                text: '我的国内旅游足迹',
                left: 'center',
                textStyle: { fontSize: 18, fontWeight: 'bold' }
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    return params.name + (params.value ? ' ✅ 已去过' : ' ❌ 未去过');
                }
            },
            visualMap: {
                show: false,
                min: 0,
                max: 1,
                inRange: {
                    color: ['#e0e0e0', '#4CAF50']
                }
            },
            series: [
                {
                    name: '旅游足迹',
                    type: 'map',
                    mapType: 'china',
                    roam: true,
                    label: {
                        show: true,
                        fontSize: 9 // 飞书里字体调小更清晰
                    },
                    emphasis: {
                        label: { color: '#fff' },
                        itemStyle: { areaColor: '#2196F3' }
                    },
                    data: visitedCities
                }
            ]
        };

        myChart.setOption(option);

        // 飞书适配：增加触摸点击兼容（手机端飞书也能用）
        myChart.on('click', function(params) {
            var cityData = visitedCities.find(item => item.name === params.name);
            if (cityData) {
                document.getElementById('cityName').innerText = params.name;
                document.getElementById('cityImg').src = cityData.img;
                document.getElementById('cityNote').innerText = cityData.note;
                document.getElementById('cityTime').innerText = cityData.time;
                document.getElementById('mask').style.display = 'block';
                document.getElementById('popup').style.display = 'block';
            }
        });

        document.getElementById('closeBtn').onclick = function() {
            document.getElementById('mask').style.display = 'none';
            document.getElementById('popup').style.display = 'none';
        };
        document.getElementById('mask').onclick = function() {
            document.getElementById('mask').style.display = 'none';
            document.getElementById('popup').style.display = 'none';
        };

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
